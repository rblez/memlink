name: Release Binaries

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            bun-target: linux-x64
          - os: ubuntu-latest
            target: linux-arm64
            bun-target: linux-arm64
          - os: macos-latest
            target: darwin-x64
            bun-target: darwin-x64
          - os: macos-latest
            target: darwin-arm64
            bun-target: darwin-arm64
          - os: windows-latest
            target: windows-x64
            bun-target: windows-x64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build binary
        run: bun run build:binaries

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: memlink-${{ matrix.target }}
          path: dist/binaries/*
          retention-days: 1

  release:
    name: Create Release
    needs: build
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/binaries
          pattern: memlink-*
          merge-multiple: true

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/binaries/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
