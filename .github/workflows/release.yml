name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Typecheck
        run: bunx tsc --noEmit

      - name: Test
        run: bun test

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

  build:
    name: build
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Cross-compile binaries
        run: |
          mkdir -p dist/binaries
          cd dist/binaries

          targets=(
            "linux:amd64:"
            "linux:arm64:"
            "darwin:amd64:"
            "darwin:arm64:"
            "windows:amd64:.exe"
          )

          for t in "${targets[@]}"; do
            IFS=':' read -r os arch ext <<< "$t"
            name="memlink-${os}-${arch}${ext}"
            echo "Building $name (bun-${os}-${arch})..."
            bun build --compile --minify \
              --target="bun-${os}-${arch}" \
              --outfile="$name" \
              ../../src/cli/index.ts
            echo "  → $(ls -lah "$name" | awk '{print $5}')"
          done

      - name: Smoke test linux/amd64
        working-directory: dist/binaries
        run: |
          chmod +x memlink-linux-amd64
          ./memlink-linux-amd64 --version

      - name: Compress
        run: |
          cd dist/binaries
          for bin in memlink-*; do
            case "$bin" in
              *.exe) tar -a -cf "${bin}.zip" "$bin" ;;
              *)     tar -czf "${bin}.tar.gz" "$bin" ;;
            esac
          done
          rm -f memlink-linux-* memlink-darwin-* memlink-windows-*
          ls -lah

      - name: Generate checksums
        working-directory: dist/binaries
        run: sha256sum * > checksums.txt && cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/binaries/*.tar.gz
            dist/binaries/*.zip
            dist/binaries/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          fail_on_unmatched_files: false
