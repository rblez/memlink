name: GUI

on:
  push:
    branches: [gui/**]
  pull_request:
    branches: [main, beta]

permissions:
  contents: read

jobs:
  build:
    name: Build memlink-gui
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/rs/target

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Build frontend
        run: npm install && npm run build
        working-directory: rs

      - name: Build Rust binary
        id: build
        run: cargo build --release
        working-directory: rs/src-tauri

      - name: Upload artifact (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: memlink-gui-linux
          path: rs/target/release/memlink-gui

      - name: Upload artifact (macos)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: memlink-gui-macos
          path: rs/target/release/memlink-gui

      - name: Upload artifact (windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: memlink-gui-windows
          path: rs/target/release/memlink-gui.exe
