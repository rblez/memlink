name: GUI

on:
  push:
    branches: [gui/**]
  pull_request:
    branches: [main, beta]

permissions:
  contents: read

jobs:
  build:
    name: Build memlink-gui
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rs/src-tauri

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev

      - name: Install deps & build
        run: |
          npm install
          npx tauri build --ci
        working-directory: rs

      - name: Locate artifacts
        shell: bash
        run: |
          echo "=== target contents ==="
          find rs/src-tauri/target/release -maxdepth 2 -type f -name "memlink-gui*" -o -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.msi" -o -name "*.exe" 2>/dev/null || true
          echo "=== bundle dir ==="
          ls -R rs/src-tauri/target/release/bundle/ 2>/dev/null || echo "no bundle dir"

      - name: Upload artifact (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: memlink-gui-linux
          path: |
            rs/src-tauri/target/release/memlink-gui
            rs/src-tauri/target/release/bundle/

      - name: Upload artifact (macos)
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: memlink-gui-macos
          path: |
            rs/src-tauri/target/release/memlink-gui
            rs/src-tauri/target/release/bundle/

      - name: Upload artifact (windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: memlink-gui-windows
          path: |
            rs/src-tauri/target/release/memlink-gui.exe
            rs/src-tauri/target/release/bundle/
